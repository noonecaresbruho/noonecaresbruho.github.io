<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Papa's Game Room — Player</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --red:#c0392b;
      --yellow:#f5c518;
      --cream:#f4f0e6;
      --dark:#1a1a18;
    }
    body{
      background:var(--dark);
      color:var(--cream);
      font-family:'IBM Plex Mono',monospace;
      display:flex;
      flex-direction:column;
      min-height:100vh;
    }

    /* TOP BAR */
    .topbar{
      display:flex;
      align-items:center;
      gap:1rem;
      padding:0.75rem 1.5rem;
      border-bottom:2px solid #333;
      flex-shrink:0;
    }
    .back-btn{
      font-family:'IBM Plex Mono',monospace;
      font-size:11px;
      letter-spacing:1px;
      text-transform:uppercase;
      color:#888;
      text-decoration:none;
      border:1px solid #333;
      padding:5px 12px;
      transition:border-color 0.15s, color 0.15s;
    }
    .back-btn:hover{border-color:#888;color:var(--cream);}
    .topbar-title{
      font-family:'Bebas Neue',sans-serif;
      font-size:20px;
      letter-spacing:1px;
      color:var(--cream);
    }
    .topbar-game{
      font-size:11px;
      color:var(--yellow);
      margin-left:auto;
    }

    /* PLAYER AREA */
    #player-wrap{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:1.5rem;
    }

    #ruffle-container{
      width:100%;
      max-width:900px;
      aspect-ratio:4/3;
      background:#000;
      position:relative;
    }

    ruffle-player{
      width:100%;
      height:100%;
      display:block;
    }

    /* ERROR STATE */
    #error-msg{
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:1rem;
      text-align:center;
      padding:2rem;
      color:#666;
      font-size:12px;
      line-height:1.8;
    }
    #error-msg strong{
      font-family:'Bebas Neue',sans-serif;
      font-size:28px;
      color:#444;
      letter-spacing:1px;
    }
    #error-msg a{
      color:var(--yellow);
      text-decoration:none;
    }
    #error-msg a:hover{text-decoration:underline;}

    /* FOOTER */
    footer{
      text-align:center;
      padding:0.75rem;
      font-size:10px;
      color:#444;
      border-top:1px solid #222;
      letter-spacing:1px;
      flex-shrink:0;
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">&#8592; voltar</a>
  <span class="topbar-title">Papa's Game Room</span>
  <span class="topbar-game" id="game-label"></span>
</div>

<div id="player-wrap">
  <div id="ruffle-container">
    <div id="error-msg">
      <strong>Jogo não encontrado</strong>
      <span>Nenhum arquivo .swf foi especificado na URL.<br>
      Use <code>player.html?game=nomedojogo.swf</code></span>
      <a href="index.html">&#8592; voltar pro início</a>
    </div>
  </div>
</div>

<footer>papa's game room &mdash; powered by ruffle.rs</footer>

<script>
  window.RufflePlayer = window.RufflePlayer || {};
  window.RufflePlayer.config = {
    autoplay: "on",
    unmuteOverlay: "visible",
    backgroundColor: "#000000",
    letterbox: "fullscreen",
    contextMenu: "on",
    showSwfDownload: false,
    quality: "high",
  };

  const params = new URLSearchParams(window.location.search);
  const game = params.get('game');

  if (game && game.endsWith('.swf')) {
    document.getElementById('game-label').textContent = game.replace('.swf','').replace(/([A-Z])/g,' $1').trim();
    document.title = game.replace('.swf','') + ' — Papa\'s Game Room';

    window.addEventListener('load', function() {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      const container = document.getElementById('ruffle-container');
      container.appendChild(player);
      player.style.width = '100%';
      player.style.height = '100%';
      player.load(game).catch(function(err) {
        showError('Não foi possível carregar <strong>' + game + '</strong>.<br>Verifique se o arquivo existe no repositório.');
      });
    });
  } else {
    document.getElementById('error-msg').style.display = 'flex';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.innerHTML = '<strong>Erro ao carregar</strong><span>' + msg + '</span><a href="index.html">&#8592; voltar pro início</a>';
    el.style.display = 'flex';
  }
</script>

</body>
</html>
