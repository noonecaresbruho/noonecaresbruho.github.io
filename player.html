<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Papa's Game Room — Player</title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--red:#c0392b;--yellow:#f5c518;--cream:#f4f0e6;--dark:#1a1a18;}
    body{background:var(--dark);color:var(--cream);font-family:'IBM Plex Mono',monospace;display:flex;flex-direction:column;min-height:100vh;}

    .topbar{display:flex;align-items:center;gap:1rem;padding:0.75rem 1.5rem;border-bottom:2px solid #2a2a28;flex-shrink:0;}
    .back-btn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#666;text-decoration:none;border:1px solid #333;padding:5px 12px;transition:border-color 0.15s,color 0.15s;}
    .back-btn:hover{border-color:#888;color:var(--cream);}
    .topbar-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
    .topbar-game{font-size:11px;color:var(--yellow);margin-left:auto;letter-spacing:1px;}

    #player-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
    #ruffle-container{width:100%;max-width:900px;aspect-ratio:4/3;background:#000;position:relative;}
    ruffle-player{width:100%;height:100%;display:block;}

    #error-msg{display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem;text-align:center;padding:2rem;color:#555;font-size:12px;line-height:1.8;width:100%;height:100%;}
    #error-msg strong{font-family:'Bebas Neue',sans-serif;font-size:28px;color:#444;letter-spacing:1px;display:block;}
    #error-msg a{color:var(--yellow);text-decoration:none;}
    #error-msg a:hover{text-decoration:underline;}

    footer{text-align:center;padding:0.75rem;font-size:10px;color:#333;border-top:1px solid #222;letter-spacing:1px;flex-shrink:0;}
  </style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">&#8592; voltar</a>
  <span class="topbar-title">Papa's Game Room</span>
  <span class="topbar-game" id="game-label"></span>
</div>

<div id="player-wrap">
  <div id="ruffle-container">
    <div id="error-msg"></div>
  </div>
</div>

<footer>papa's game room &mdash; powered by ruffle.rs</footer>

<script>
  window.RufflePlayer = window.RufflePlayer || {};
  window.RufflePlayer.config = {
    autoplay: 'on',
    unmuteOverlay: 'visible',
    backgroundColor: '#000000',
    letterbox: 'fullscreen',
    contextMenu: 'on',
    showSwfDownload: false,
    quality: 'high',
  };

  var params = new URLSearchParams(window.location.search);
  var game = params.get('game');

  if (game && game.toLowerCase().endsWith('.swf')) {
    var label = game.replace(/\.swf$/i,'').replace(/^papas/i,"Papa's ").replace(/([a-z])([A-Z])/g,'$1 $2').replace(/_/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();});
    document.getElementById('game-label').textContent = label;
    document.title = label + ' — Papa\'s Game Room';

    window.addEventListener('load', function() {
      var ruffle = window.RufflePlayer.newest();
      var player = ruffle.createPlayer();
      var container = document.getElementById('ruffle-container');
      container.appendChild(player);
      player.style.width = '100%';
      player.style.height = '100%';
      player.load(game).catch(function() {
        showError('<strong>Arquivo não encontrado</strong>' + game + '<br><a href="index.html">&#8592; voltar</a>');
      });
    });
  } else {
    showError('<strong>Nenhum jogo especificado</strong>Use <code>player.html?game=arquivo.swf</code><br><br><a href="index.html">&#8592; voltar pro início</a>');
  }

  function showError(html) {
    var el = document.getElementById('error-msg');
    el.innerHTML = html;
    el.style.display = 'flex';
  }
</script>
</body>
</html>
