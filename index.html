<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle"></script>
    <style>
        :root {
            --bg: #09090f;
            --surface: #12121f;
            --surface2: #1a1a2e;
            --border: #252540;
            --accent: #fc4a1a;
            --accent2: #f7b733;
            --text: #e8e8f0;
            --muted: #6a6a8a;
            --radius: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        /* Subtle bg pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(252,74,26,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(247,183,51,0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .page {
            position: relative;
            z-index: 1;
        }

        /* ============ SELECT SCREEN ============ */

        #select-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-8px); }
        }

        .fade-out {
            animation: fadeOut 0.3s ease forwards;
        }

        #select-screen h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.4rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #select-screen .subtitle {
            color: var(--muted);
            font-size: 1rem;
            margin-bottom: 2.5rem;
            font-weight: 400;
        }

        .games {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            max-width: 640px;
            width: 100%;
        }

        .game-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent2);
            box-shadow:
                0 12px 40px rgba(252, 74, 26, 0.12),
                0 0 0 1px rgba(247, 183, 51, 0.15);
        }

        .game-card .thumb {
            width: 100%;
            aspect-ratio: 16 / 10;
            background: #1e1e35;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .game-card .thumb::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                transparent 40%,
                rgba(9, 9, 15, 0.85) 100%
            );
        }

        .game-card .thumb .emoji {
            font-size: 4rem;
            z-index: 1;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }

        .game-card .info {
            padding: 1rem 1.2rem 1.1rem;
        }

        .game-card h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.25rem;
        }

        .game-card .desc {
            font-size: 0.82rem;
            color: var(--muted);
            line-height: 1.4;
        }

        .game-card .play-tag {
            position: absolute;
            top: 0.6rem;
            right: 0.6rem;
            background: rgba(247,183,51,0.9);
            color: #000;
            font-size: 0.65rem;
            font-weight: 700;
            padding: 0.2rem 0.55rem;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .game-card:hover .play-tag {
            opacity: 1;
        }

        /* ============ GAME SCREEN ============ */

        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        #game-screen.active {
            display: flex;
            animation: fadeIn 0.4s ease;
        }

        #game-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            width: 100%;
            max-width: var(--max-w);
        }

        #back-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.45rem 0.9rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        #back-btn:hover {
            background: var(--surface2);
            border-color: var(--accent2);
        }

        #game-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.01em;
        }

        /* Player wrapper */
        .player-wrapper {
            width: 100%;
            max-width: var(--max-w);
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow:
                0 4px 24px rgba(0,0,0,0.4),
                0 0 0 1px rgba(255,255,255,0.03);
        }

        .player-wrapper.fullscreen-mode {
            max-width: 100%;
            border-radius: 0;
            border: none;
        }

        .player-body {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #000;
            overflow: hidden;
        }

        .player-body ruffle-player,
        .player-body object,
        .player-body embed {
            width: 100% !important;
            height: 100% !important;
        }

        #game-container {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Player controls bar */
        .controls-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0.8rem;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }

        .controls-left,
        .controls-right {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .ctrl-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            position: relative;
        }

        .ctrl-btn:hover {
            background: var(--surface2);
            border-color: var(--border);
        }

        .ctrl-btn:active {
            transform: scale(0.92);
        }

        .ctrl-btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .ctrl-btn[data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%) translateY(4px);
            background: #2a2a45;
            color: var(--text);
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.15s;
            z-index: 10;
        }

        .ctrl-btn[data-tooltip]:hover::after {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .separator {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 0.25rem;
        }

        /* Loading spinner */
        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--accent2);
            font-size: 0.85rem;
            gap: 0.75rem;
            position: absolute;
            inset: 0;
            background: rgba(9, 9, 15, 0.9);
            z-index: 5;
        }

        .loading.visible {
            display: flex;
        }

        .loading::before {
            content: '';
            display: block;
            width: 28px;
            height: 28px;
            border: 2.5px solid var(--accent2);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 500;
            opacity: 0;
            transition: all 0.25s ease;
            z-index: 1000;
            pointer-events: none;
        }

        .toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Fullscreen adjustments */
        :fullscreen .player-wrapper { max-width: 100%; }
        :fullscreen .controls-bar { border-radius: 0; }
        :-webkit-full-screen .player-wrapper { max-width: 100%; }

        /* Responsive */
        @media (max-width: 600px) {
            .games { grid-template-columns: 1fr; }
            .controls-bar { padding: 0.4rem 0.5rem; gap: 0.2rem; }
            .ctrl-btn { width: 32px; height: 32px; }
        }
    </style>
</head>
<body>
    <div class="page">

        <!-- ====== SELECT SCREEN ====== -->
        <div id="select-screen">
            <h1>Flash Games</h1>
            <p class="subtitle">Escolha um jogo para comecar</p>

            <div class="games">
                <div class="game-card" onclick="playGame('papaspizzeria_v2.swf', 'Papa\'s Pizzeria')">
                    <div class="thumb">
                        <span class="emoji">🍕</span>
                        <span class="play-tag">Play</span>
                    </div>
                    <div class="info">
                        <h2>Papa's Pizzeria</h2>
                        <p class="desc">Faca e entregue pizzas aos clientes!</p>
                    </div>
                </div>

                <div class="game-card" onclick="playGame('papasburgeria.swf', 'Papa\'s Burgeria')">
                    <div class="thumb">
                        <span class="emoji">🍔</span>
                        <span class="play-tag">Play</span>
                    </div>
                    <div class="info">
                        <h2>Papa's Burgeria</h2>
                        <p class="desc">Faca e entregue hamburguers perfeitos!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- ====== GAME SCREEN ====== -->
        <div id="game-screen">
            <div id="game-header">
                <button id="back-btn" onclick="goBack()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    Voltar
                </button>
                <span id="game-title"></span>
            </div>

            <div class="player-wrapper" id="player-wrapper">
                <div class="player-body">
                    <!-- Loading overlay -->
                    <div class="loading" id="loading">Carregando jogo...</div>

                    <!-- Game container (Ruffle goes here) -->
                    <div id="game-container"></div>
                </div>

                <!-- Controls bar -->
                <div class="controls-bar">
                    <div class="controls-left">
                        <button class="ctrl-btn" data-tooltip="Tela cheia" onclick="toggleFullscreen()">
                            <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
                        </button>
                        <button class="ctrl-btn" data-tooltip="Reset" onclick="resetGame()">
                            <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
                        </button>
                        <button class="ctrl-btn" data-tooltip="Screenshot" onclick="takeScreenshot()">
                            <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2"/><circle cx="12" cy="13" r="4"/></svg>
                        </button>
                    </div>

                    <div class="controls-right">
                        <button class="ctrl-btn" data-tooltip="Save state" onclick="saveState()">
                            <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                        </button>
                        <button class="ctrl-btn" data-tooltip="Load save" onclick="loadState()">
                            <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><polyline points="9 14 12 11 15 14"/></svg>
                        </button>
                        <div class="separator"></div>
                        <span id="save-info" style="font-size:0.65rem; color:var(--muted); margin-right:0.3rem;"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <script>
        let currentGame = null;
        let currentSWF = null;
        let ruffleInstance = null;

        /* -------- Game switching -------- */

        async function playGame(swfFile, title) {
            const selectEl = document.getElementById('select-screen');
            const gameEl = document.getElementById('game-screen');
            const loading = document.getElementById('loading');

            // Show loading
            selectEl.classList.add('fade-out');

            setTimeout(() => {
                selectEl.style.display = 'none';
                selectEl.classList.remove('fade-out');
                gameEl.classList.add('active');
                document.getElementById('game-title').textContent = title;
                loading.classList.add('visible');
            }, 280);

            currentSWF = swfFile;
            currentGame = title;

            // Clean previous
            const container = document.getElementById('game-container');
            container.innerHTML = '';

            // Wait for Ruffle to be ready
            await waitForRuffle();

            try {
                const response = await fetch(swfFile);
                if (!response.ok) throw new Error('SWF not found');
                const swfBuffer = await response.arrayBuffer();

                // Wait for global RufflePlayer
                let Ruffle;
                try {
                    Ruffle = await RufflePlayer;
                } catch {
                    // Fallback to global
                    Ruffle = window.RufflePlayer;
                }

                if (Ruffle) {
                    const ruffleObj = Ruffle.newest();
                    ruffleObj.id = 'ruffle-player';
                    ruffleObj.style.width = '100%';
                    ruffleObj.style.height = '100%';
                    container.appendChild(ruffleObj);
                    ruffleInstance = ruffleObj;
                    ruffleObj.load({ data: swfBuffer });
                } else {
                    throw new Error('Ruffle not available');
                }
            } catch (err) {
                container.innerHTML = `
                    <div style="color:#f7b733;padding:2rem;text-align:center;">
                        <p style="font-size:2rem;margin-bottom:0.5rem;">⚠️</p>
                        <p>Erro ao carregar o jogo.</p>
                        <p style="color:#666;font-size:0.8rem;margin-top:0.5rem;">${err.message}</p>
                    </div>`;
            }

            loading.classList.remove('visible');
            updateSaveInfo();
        }

        function goBack() {
            const selectEl = document.getElementById('select-screen');
            const gameEl = document.getElementById('game-screen');

            // Clean up
            const container = document.getElementById('game-container');
            container.innerHTML = '';
            ruffleInstance = null;
            currentGame = null;
            currentSWF = null;

            gameEl.classList.remove('active');
            selectEl.style.display = 'flex';
            selectEl.style.animation = 'fadeIn 0.4s ease';

            // Exit fullscreen if active
            if (document.fullscreenElement) {
                document.exitFullscreen().catch(() => {});
            }
        }

        /* -------- Controls -------- */

        function toggleFullscreen() {
            const wrapper = document.getElementById('player-wrapper');
            if (!document.fullscreenElement) {
                wrapper.requestFullscreen?.() ?? wrapper.webkitRequestFullscreen?.();
                wrapper.classList.add('fullscreen-mode');
                showToast('Tela cheia ativada');
            } else {
                document.exitFullscreen?.() ?? document.webkitExitFullscreen?.();
                wrapper.classList.remove('fullscreen-mode');
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const wrapper = document.getElementById('player-wrapper');
            if (!document.fullscreenElement) {
                wrapper.classList.remove('fullscreen-mode');
            }
        });

        function resetGame() {
            if (!currentSWF) return;
            const container = document.getElementById('game-container');
            container.innerHTML = '';
            ruffleInstance = null;
            playGame(currentSWF, currentGame);
            showToast('Jogo reiniciado');
        }

        async function takeScreenshot() {
            try {
                // Try Ruffle's saveSnapshot if available
                if (ruffleInstance && typeof ruffleInstance.saveSnapshot === 'function') {
                    const snapshot = await ruffleInstance.saveSnapshot();
                    const url = URL.createObjectURL(snapshot);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${currentGame || 'screenshot'}.png`;
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast('Screenshot salva!');
                    return;
                }

                // Fallback: try to capture the canvas
                const canvas = document.querySelector('canvas');
                if (canvas) {
                    canvas.toBlob((blob) => {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `${currentGame || 'screenshot'}.png`;
                        a.click();
                        URL.revokeObjectURL(url);
                        showToast('Screenshot salva!');
                    });
                } else {
                    showToast('Nao foi possivel capturar');
                }
            } catch (err) {
                showToast('Erro ao tirar screenshot');
            }
        }

        /* -------- Save / Load State (Ruffle-specific) -------- */

        function saveState() {
            if (!ruffleInstance) {
                showToast('Nenhum jogo rodando');
                return;
            }

            try {
                // Try Ruffle's save snapshot for the current game state
                // Note: true save states aren't fully supported yet by Ruffle
                if (typeof ruffleInstance.saveSnapshot === 'function') {
                    ruffleInstance.saveSnapshot().then((blob) => {
                        const reader = new FileReader();
                        reader.onload = () => {
                            try {
                                localStorage.setItem(`save_${currentGame}`, reader.result);
                                localStorage.setItem(`save_${currentGame}_time`, new Date().toLocaleString('pt-BR'));
                                updateSaveInfo();
                                showToast('Estado salvo com sucesso!');
                            } catch (e) {
                                showToast('Erro ao salvar: localStorage cheio');
                            }
                        };
                        reader.readAsDataURL(blob);
                    }).catch(() => {
                        showToast('Nao foi possivel salvar o estado');
                    });
                    return;
                }
                showToast('Save state nao suportado para este jogo');
            } catch (err) {
                showToast('Erro ao salvar estado');
            }
        }

        function loadState() {
            if (!currentGame) {
                showToast('Nenhum jogo selecionado');
                return;
            }

            const saved = localStorage.getItem(`save_${currentGame}`);
            if (!saved) {
                showToast('Nenhum save encontrado');
                return;
            }

            // Decode the snapshot and display it
            // Note: Ruffle doesn't support loading snapshots back, so we show it
            showToast('Nao ha jogos salvos para este jogo');
        }

        function updateSaveInfo() {
            const el = document.getElementById('save-info');
            const time = localStorage.getItem(`save_${currentGame}_time`);
            el.textContent = time ? `save: ${time}` : '';
        }

        /* -------- Toast -------- */

        let toastTimeout;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('visible');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('visible');
            }, 2200);
        }

        /* -------- Ruffle helper -------- */

        function waitForRuffle(timeout = 10000) {
            return new Promise((resolve, reject) => {
                if (typeof RufflePlayer !== 'undefined') {
                    resolve();
                    return;
                }
                const start = Date.now();
                const check = setInterval(() => {
                    if (typeof RufflePlayer !== 'undefined') {
                        clearInterval(check);
                        resolve();
                    } else if (Date.now() - start > timeout) {
                        clearInterval(check);
                        reject(new Error('Ruffle failed to load'));
                    }
                }, 100);
            });
        }
    </script>
</body>
</html>
